# config.novamaster.ini - NovaMaster Voice Assistant Configuration
# Uses VibeVoice TTS (port 8093) instead of Piper TTS
# Voice loop: User speaks -> Whisper STT -> Ollama LLM -> VibeVoice TTS -> Speaker

[Models]
ollama_model = qwen3:latest
whisper_model = small.en
wakeword_model_path = models/jarvis_v2.onnx
piper_model_path = models/en_US-lessac-medium.onnx
ollama_host = http://127.0.0.1:11434

[Functionality]
wakeword = hey jarvis
wakeword_threshold = 0.40
vad_aggressiveness = 1
silence_seconds = 0.5
listen_timeout = 5.0
pre_buffer_ms = 300
system_prompt = You are Nova, a voice assistant that can OPEN and CONTROL SERVICES. When the user says "open X", "start X", "launch X", or "go to X", respond with [ACTION:open:X]. Available: aion ui, open webui, hermes, n8n, space agent, grafana, portainer, langfuse, openclaw, litellm, qdrant, jarvis, comfyui, ollama, vibevoice, clawmem, launcher, dashboard, nova master. For questions, answer normally without [ACTION] tags. Keep responses to 1-2 short sentences for voice.
device_index = None
piper_output_device_index = 0
gain = 0.8
max_words_per_command = 80
max_phrase_duration = 10.0
whisper_device = cpu
whisper_compute_type = int8
whisper_avg_logprob = -1.0
whisper_no_speech_prob = 0.65
max_history_tokens = 2048
audio_buffer_size = 400
trim_wake_word = true

# NovaMaster-specific settings
vibevoice_url = http://127.0.0.1:8093
vibevoice_voice = en-Carter_man
tts_engine = vibevoice

[Performance]
gc_interval = 10
memory_profiling = false